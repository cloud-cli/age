<template component="app-editor">
  <div class="relative">
    <lucide-icon
      icon="loader"
      size="12"
      class="mr-2 text-zinc-400 absolute top-0 right-0 animate-spin"
      bind-class="{ 'inline-block': selected?.loading, 'hidden': !selected }"
    ></lucide-icon>
    <template if="workspace">
      <div class="flex h-full">
        <code-editor
          bind-readonly="true"
          class="w-2/3"
          bind-value="selected?.content || ''"
          on-change="selected && onSetContent($event.target.value)"
        ></code-editor>
        <file-tree class="w-1/3" bind-files="files" on-select="onSelectFile($event.detail)"></file-tree>
      </div>
    </template>
  </div>
  <script setup>
    import { ref, hook, watch, defineProp } from "@li3/web";
    import { Workspaces } from "https://agents.apphor.de/index.mjs";

    export default function () {
      const ws = defineProp("workspace");
      const selected = ref(null);
      const files = ref([]);

      function onSetContent(value) {
        selected.value.content = value;
      }

      async function onUpdateFileList() {
        selected.value = null;
        const name = ws.value;

        if (!name) {
          files.value = [];
          return;
        }

        files.value = await Workspaces.read(name);
      }

      async function onSelectFile(file) {
        selected.value = file;

        if (!file.loaded && !file.loading) {
          file.loading = true;

          try {
            const content = await Workspaces.readFile(name, file);
          } finally {
            file.loading = false;
            file.loaded = true;
          }
        }
      }

      watch(ws, () => onUpdateFileList());

      return { files, selected, onSelectFile, onSetContent };
    }
  </script>
</template>
