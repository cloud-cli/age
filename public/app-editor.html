<template component="app-editor">
  <div class="relative">
    <lucide-icon
      icon="loader"
      size="12"
      class="mr-2 text-zinc-400 absolute left-0 right-0 animate-spin"
      bind-class="{ 'inline-block': selectedFile?.loading, 'hidden': !selectedFile }"
    ></lucide-icon>
    <template if="workspace">
      <div class="flex h-full">
        <code-editor
          bind-readonly="true"
          class="w-2/3"
          bind-value="selectedFile?.content || ''"
          on-change="onSetContent($event.target.value)"
        ></code-editor>
        <file-tree class="w-1/3" bind-files="files" on-select="onSelectFile($event.detail)"></file-tree>
      </div>
    </template>
  </div>
  <script setup>
    import { ref, hook, watch, defineProp } from "@li3/web";
    import { storeToRefs } from "@li3/store";
    import { useStore } from "/public/store.mjs";

    export default function () {
      const store = useStore();
      const { workspace, files, selectedFile } = storeToRefs(store);

      function onSetContent(value) {
        store.setFileContent(value);
      }

      async function onSelectFile(file) {
        store.selectFile(file);

        if (!file.loaded && !file.loading) {
          file.loading = true;

          try {
            const content = await Workspaces.readFile(workspace.value, file.path);
            store.setFileContent(content);
          } finally {
            file.loading = false;
            file.loaded = true;
          }
        }
      }

      return { files, selectedFile, workspace, onSelectFile, onSetContent };
    }
  </script>
</template>
