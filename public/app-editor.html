<template>
  <div class="flex">
    <code-editor
      class="w-2/3"
      bind-value="selected?.content"
      on-change="selected && onSetContent($event.target.value)"
    ></code-editor>
    <file-tree class="w-1/3" bind-files="files" on-select="onSelectFile($event.detail)"></file-tree>
  </div>
  <script setup>
    import { ref, hook, defineProp } from "@li3/web";

    export default function () {
      const ws = defineProp("workspace");
      const [selected, onSelect] = hook(null);
      const files = ref([]);

      function onSetContent(value) {
        selected.value.content = value;
      }

      function onUpdateFileList() {
        if (!ws.value) {
          files.value = [];
          selected.value = null;
          return;
        }
      }

      watch(ws, () => onUpdateFileList());

      return { files, selected, onSelect, onSetContent };
    }
  </script>
</template>
