<template component="app-editor">
  <div class="relative h-full">
    <template if="workspace">
      <div class="flex h-full">
        <code-editor
          bind-readonly="true"
          class="w-2/3"
          bind-value="selectedFile?.content || ''"
          on-change="onSetContent($event.target.value)"
        ></code-editor>

        <div class="w-1/3 flex flex-col items-stretch space-y-1">
          <div class="flex items-center justify-end bg-zinc-500/50 border-b gap-1 p-1 text-white">
            <button on-click="store.addFileToSession()" bind-disabled="!selectedFile" class-text-zinc-500="!selectedFile">
              <lucide-icon size="14" icon="message-square-plus" title="Add to conversation"></lucide-icon>
            </button>
          </div>
          <file-tree class="flex-1" bind-files="files" on-select="onSelectFile($event.detail)"></file-tree>
        </div>
      </div>
    </template>
  </div>
  <script setup>
    import { ref, hook, watch, defineProp } from "@li3/web";
    import { storeToRefs } from "@li3/store";
    import { useStore } from "@app/store.mjs";

    export default function () {
      const store = useStore();
      const { workspace, files, selectedFile } = storeToRefs(store);

      function onSetContent(value) {
        store.setFileContent(value);
      }

      async function onSelectFile(file) {
        store.selectFile(file);

        if (!file.loaded) {
          try {
            await store.loadFileContent();
          } finally {
            file.loaded = true;
          }
        }
      }

      return { files, selectedFile, workspace, onSelectFile, onSetContent, store };
    }
  </script>
</template>
