<template component="markdown-it">
  <div>...</div>
  <script setup>
    import "https://app.unpkg.com/markdown-it@14.3.0/files/dist/markdown-it.min.js"
    import { defineProp, getElement } from '@li3/web';

    export default function() {
      const markdown = new globalThis.markdownit("default");
      const source = defineProp('src');
      const element = getElement();

      watch(source, (v) => {
        element.innerHTML = markdown.render(v);
      });
    }
  </script>
</template>
