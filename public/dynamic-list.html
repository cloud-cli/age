<template component="dynamic-list">
  <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1 gap-1">
    <span class="text-[10px] text-zinc-500 font-mono uppercase mr-2 hidden md:block">{{ label || '' }}</span>
    <select
      class="bg-transparent text-xs text-zinc-300 cursor-pointer"
      on-change="onSelect($event.target.value)"
      bind-value="selected"
    >
      <option bind-value="null">{{ placeholder }}</option>
      <template for="s of list">
        <option bind-value="s.value">{{ s.label }}</option>
      </template>
    </select>
    <button type="button" on-click="onAdd()" class="text-xs text-zinc-600">
      <lucide-icon icon="plus" size="16" title="Add"></lucide-icon>
    </button>
    <button type="button" on-click="onReload()" class="text-xs text-zinc-600">
      <lucide-icon
        class="block"
        class-animate-spin="!!spinning"
        icon="refresh-cw"
        size="16"
        title="Reload"
      ></lucide-icon>
    </button>
    <template for="b of actions">
      <button type="button" on-click="onDispatch(b.action, b.data)" class="text-xs text-zinc-600">
        <lucide-icon icon="b.icon" size="16" title="b.label"></lucide-icon>
      </button>
    </template>
  </div>
  <script setup>
    import { defineProp, getElement, defineEvent } from "@li3/web";

    export default function () {
      const el = getElement();
      const list = defineProp("list");
      const label = defineProp("label");
      const selected = defineProp("selected");
      const placeholder = defineProp("placeholder");
      const spinning = defineProp("spinning");
      const onAdd = defineEvent("add");
      const onReload = defineEvent("reload");
      const onSelect = defineEvent("select");
      const actions = defineProp("actions");
      const onDispatch = (e, v) => el.dispatchEvent(new CustomEvent(e, { detail: v }));

      return { onAdd, onReload, onSelect, onDispatch };
    }
  </script>
</template>
