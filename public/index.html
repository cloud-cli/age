<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Droid Workspace</title>
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://at-s.static.apphor.de/",
          "@app/": "./"
        }
      }
    </script>
    <script type="module">
      import { load } from "@li3/web";
      ["lucide-icon", "markdown-block", "code-editor"].map((x) => load(`https://sodium.static.apphor.de/${x}.html`));
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-sans h-screen flex flex-col overflow-hidden">
    <template app>
      <!-- Top Navigation: Multi-API Provider & Control Bar -->
      <app-header class="contents"></app-header>

      <!-- Main Grid Workspace Layout -->
      <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Asynchronous Agent Tasks & Backlog -->
        <app-sidebar class="contents" on-select="onSelectWorkspace($event.detail)"></app-sidebar>

        <!-- Center Panel: The Execution Stream (Chat, Prompts & Logs) -->
        <app-chat bind-workspace="ws" class="contents"></app-chat>

        <!-- Right Panel: Live Workspace View / File Diffs / Split Sandbox Browser -->
        <!-- <app-terminal class="contents"></app-terminal> -->
      </main>
      <script setup>
        import { hook } from "@li3/web";

        export default function () {
          const [ws, onSelectWorkspace] = hook("");
          return { ws, onSelectWorkspace };
        }
      </script>
    </template>

    <template component="app-chat">
      <section class="flex-1 flex flex-col bg-zinc-950 border-r border-zinc-800">
        <div class="flex items-center justify-between px-4 pt-1" class-hidden="!workspace">
          <div></div>
          <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1 gap-1">
            <span class="text-[10px] text-zinc-500 font-mono uppercase mr-2">Sessions:</span>
            <select
              class="bg-transparent text-xs text-zinc-300 focus:outline-none cursor-pointer"
              on-change="onSetSessionId($event.target.value)"
            >
              <option disabled>Switch sessions</option>
              <template for="s of sessionList">
                <option bind-value="s.id">{{ s.title || s.id }}</option>
              </template>
            </select>
            <button type="button" on-click="onCreateSession()" class="text-xs text-zinc-600 font-mono">
              <lucide-icon icon="plus" size="16" title="New session"></lucide-icon>
            </button>
          </div>
          <div>
            <button on-click="onDeleteSession()" class="p-2 text-red-500 font-bold" class-hidden="!session">
              <lucide-icon icon="x" size="16" title="Delete session"></lucide-icon>
            </button>
          </div>
        </div>

        <template if="session">
          <div class="px-4 pb-2 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/10">
            <div>
              <h2 class="text-sm font-medium text-zinc-200">{{ session.title || session.id || '' }}</h2>
              <p class="text-xs text-zinc-500">{{ new Date(session.createdAt).toISOString().slice(0, 19)}}</p>
            </div>
            <div class="flex space-x-2">
              <span class="text-xs text-zinc-400 bg-zinc-900 px-2 py-1 rounded border border-zinc-800"
                >{{ session.model || 'default' }}</span
              >
            </div>
          </div>
        </template>

        <!-- Agent Thought & Execution Feed (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 font-mono text-xs">
          <template for="m of messages">
            <div class="flex gap-3 max-w-3xl">
              <div
                class="w-6 h-6 mt-4 rounded-full flex items-center justify-center text-[10px] font-bold"
                bind-class="{
              'bg-emerald-950.border.border-emerald-800.text-emerald-400': m.role === 'assistant',
              'text-zinc-400.bg-zinc-800': m.role === 'user',
            }"
              >
                {{ m.role.at(0).toUpperCase() }}
              </div>

              <div class="flex-1 mb-1">
                <template if="m.role !== 'tool'">
                  <div
                    class="bg-zinc-900 p-3 rounded-lg border border-zinc-800 leading-relaxed flex-1"
                    class-text-zink-300="!m.thinking"
                    class-text-zink-500="m.thinking"
                  >
                    <span class="mr-2 animate-spin text-zinc-400" class-hidden="!m.thinking">⚙</span>
                    <markdown-block bind-src="m.content || m.thinking"></markdown-block>
                  </div>
                </template>

                <template if="m.role === 'tool'">
                  <div class="text-xs">
                    <div class="flex items-center text-emerald-500">
                      <span class="mr-2">✓</span>Tool:
                      <code class="text-zinc-300 ml-1 bg-zinc-950 px-1 py-0.5 rounded">{{ m.tool_name }}</code>
                    </div>
                    <div class="flex items-center text-zinc-500">{{ m.content }}</div>
                  </div></template
                >
              </div>
            </div>
          </template>
        </div>

        <!-- Persistent Prompt Input Box -->
        <div class="p-3 border-t border-zinc-800 bg-zinc-900/20">
          <div
            class="relative bg-zinc-900 border border-zinc-800 rounded-xl focus-within:border-zinc-700 transition p-2"
          >
            <form on-submit.prevent="onSend()">
              <div class="flex justify-between items-center pt-2 px-1">
                <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1">
                  <span class="text-[10px] text-zinc-500 font-mono uppercase mr-2">Models:</span>
                  <select
                    class="bg-transparent text-xs text-zinc-300 focus:outline-none cursor-pointer"
                    on-change="onSelectModel($event.target.value)"
                    bind-value="model"
                  >
                    <option>Models</option>
                    <template for="m of modelList">
                      <option value="m.id">{{ m.id }}</option>
                    </template>
                  </select>
                </div>
                <button
                  type="submit"
                  class="bg-zinc-100 hover:bg-zinc-200 text-zinc-950 font-semibold text-xs px-3 py-1 rounded-md transition"
                  class-animate-pulse.bg-white.opacity-70="sending"
                  bind-disabled="sending"
                >
                  <lucide-icon icon="send-horizontal" size="16" title="Send"></lucide-icon>
                </button>
              </div>
              <textarea
                rows="2"
                placeholder="Next step"
                bind-value="newMessage"
                bind-disabled="sending"
                class="w-full bg-transparent text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none resize-none px-2 py-1"
                on-input.stop="setMessage($event.target.value)"
              ></textarea>
            </form>
          </div>
        </div>
      </section>

      <script setup>
        import { ref, computed, hook, watch, onInit, defineProp, defineEvent } from "@li3/web";
        import { Workspaces, Sessions, Models } from "https://agents.apphor.de/index.mjs";

        export default function () {
          const ws = defineProp("workspace");
          const session = ref(null);
          const sessionId = computed(() => session.value?.id);
          const sessionList = ref([]);
          const sending = ref(false);
          const [newMessage, setMessage] = hook("");
          const messages = ref([]);
          const modelList = ref([]);
          const [model, onSelectModel] = hook("");

          async function onSend() {
            const message = newMessage.value;

            try {
              sending.value = true;
              const response = await Sessions.sendMessage(ws.value, session.value.id, { message, model: model.value });
              setMessage("");
              messages.value = response.messages;
            } catch (e) {
              console.log(e);
            } finally {
              sending.value = false;
            }
          }

          async function onSetSessionId(id) {
            const item = sessionList.value.find((s) => s.id === id);

            if (!item) {
              session.value = null;
              messages.value = [];
              return;
            }

            session.value = item;
          }

          async function onCreateSession() {
            const newSession = await Sessions.create(ws.value);
            sessionList.value = sessionList.value.concat(newSession);
            session.value = newSession;
          }

          async function onDeleteSession() {
            if (!sessionId.value) return;
            if (!confirm("Are you sure?")) return;

            await Sessions.delete(ws.value, sessionId.value);
            onSetSessionId("");
            await updateSessionList();
          }

          async function reloadMessages() {
            if (ws.value && sessionId.value) {
              const json = await Sessions.read(ws.value, sessionId.value);
              messages.value = json.messages;
            }
          }

          async function reloadModelList() {
            modelList.value = await Models.list();
          }

          async function updateSessionList() {
            if (!ws.value) return;
            sessionList.value = await Sessions.list(ws.value);
          }

          onInit(reloadModelList);

          watch(session, (v) => v && reloadMessages());
          watch(ws, () => updateSessionList());
          watch(sessionList, () => {
            if (sessionList.value.length === 1) {
              onSetSessionId(sessionList[0].id);
            }
          });

          return {
            messages,
            newMessage,
            setMessage,
            sending,
            session,
            sessionList,
            model,
            modelList,
            reloadModelList,

            onSend,
            onSetSessionId,
            onDeleteSession,
            onCreateSession,
            onSelectModel,
          };
        }
      </script>
    </template>

    <template component="app-header">
      <header
        class="h-14 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-4 flex items-center justify-between z-10"
      >
        <div class="flex items-center space-x-3">
          <span class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="font-semibold text-sm tracking-wide uppercase text-zinc-300">Workspace</span>
        </div>

        <div class="flex items-center space-x-3">
          <button
            on-click="signIn(true)"
            class="text-emerald-600 hover:text-emerald-500 border border-zinc-950 p-2 rounded-full transition"
          >
            <lucide-icon icon="user"></lucide-icon>
          </button>
        </div>
      </header>

      <script setup>
        import { ref, onInit } from "@li3/web";
        import { signIn, events, getProfile } from "https://auth.api.apphor.de/index.mjs";

        export default function () {
          const profile = ref(null);

          events.addEventListener("state", (e) => {
            profile.value = e.detail;
          });

          onInit(async () => {
            profile.value = await getProfile();
          });

          return { signIn, profile };
        }
      </script>
    </template>

    <template component="app-sidebar">
      <aside class="w-64 border-r border-zinc-800 bg-zinc-900/20 flex flex-col">
        <div class="p-3 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/40">
          <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Workspaces</span>
          <button
            class="text-zinc-400 hover:text-white text-xs p-2 w-6 h-6"
            on-click="onCreateWorkspace()"
            aria-label="Add workspace"
          >
            <lucide-icon icon="plus" size="16"></lucide-icon>
          </button>
        </div>

        <!-- List of ongoing Agent Missions/Tasks -->
        <div class="flex-1 overflow-y-auto p-2 space-y-1.5">
          <!-- Workspaces -->
          <template for="ws of workspaces">
            <button
              class="p-2 block w-full bg-zinc-900/80 border border-emerald-900/30 rounded-lg group cursor-pointer hover:border-zinc-700 transition"
              on-click="onSelect(ws.name)"
            >
              <div class="flex justify-between items-center">
                <span class="text-xs font-mono font-medium text-zinc-200">{{ ws.name }}</span>
                <span class="w-3 h-3 bg-emerald-800 rounded-full" class-hidden="workspace !== ws.name"></span>
              </div>
            </button>
          </template>
        </div>
      </aside>
      <script setup>
        import { ref, onInit, defineEvent, defineProp } from "@li3/web";
        import { Workspaces } from "https://agents.apphor.de/index.mjs";

        export default function () {
          defineProp("list");
          const selected = defineProp("workspace");
          const onSelect = defineEvent("select");
          const onCreate = defineEvent("create");

          const list = ref([]);
          async function onCreateWorkspace() {
            const nameInput = prompt("Name (optional)", "") || undefined;
            const { name } = await Workspaces.create(nameInput);
            await updateWorkspaces();
            onCreate(name);
            selected.value = name;
            onSelect(name);
          }

          async function updateWorkspaces() {
            list.value = await Workspaces.list();
          }

          onInit(() => {
            updateWorkspaces();
          });

          return { workspaces: list, onSelect, onCreateWorkspace };
        }
      </script>
    </template>

    <template component="app-terminal">
      <section class="w-1/3 bg-zinc-900/10 flex flex-col overflow-hidden">
        <!-- Tabs Selector -->
        <div class="h-10 border-b border-zinc-800 bg-zinc-950/60 flex items-center px-2 space-x-1 font-mono text-xs">
          <button
            class="px-3 py-1.5 bg-zinc-900 border border-zinc-800 border-b-transparent text-zinc-200 rounded-t-md"
          >
            Workspace: src/auth.py
          </button>
          <button class="px-3 py-1.5 text-zinc-500 hover:text-zinc-300 transition">Terminal Stream</button>
          <button class="px-3 py-1.5 text-zinc-500 hover:text-zinc-300 transition">Shared Browser</button>
        </div>

        <!-- File Content Workspace Simulation -->
        <div class="flex-1 overflow-auto p-4 bg-zinc-950 font-mono text-[11px] text-zinc-400 leading-normal">
          <div class="flex space-x-4">
            <div class="text-zinc-700 text-right select-none pr-2 border-r border-zinc-900">
              1<br />2<br />3<br />4<br />5<br />6<br />7<br />8<br />9<br />10
            </div>
            <div class="overflow-x-auto text-zinc-300">
              <span class="text-zinc-500">import</span> jwt<br />
              <span class="text-zinc-500">from</span> fastapi <span class="text-zinc-500">import</span> HTTPException,
              Security<br /><br />
              <span class="text-zinc-400">def</span>
              <span class="text-emerald-400">verify_access_token</span>(token: str):<br />
              &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-zinc-500">try</span>:<br />
              <span class="bg-emerald-950/50 text-emerald-300 block w-full"
                >&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# FIXED BY DROID: Added explicit algorithm
                constraints</span
              >
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;payload = jwt.decode(token, SECRET_KEY, algorithms=[<span
                class="text-amber-400"
                >"HS256"</span
              >])<br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="text-zinc-500">return</span> payload<br />
              &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-zinc-500">except</span> jwt.PyJWTError:<br />
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="text-zinc-500">raise</span>
              HTTPException(status_code=<span class="text-rose-400">401</span>, detail=<span class="text-amber-400"
                >"Invalid token"</span
              >)
            </div>
          </div>
        </div>
      </section>
    </template>
  </body>
</html>
