<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="component" href="/public/app-header.html" />
    <link rel="component" href="/public/app-chat.html" />
    <link rel="component" href="/public/app-editor.html" />
    <link rel="component" href="/public/collapsed-text.html" />
    <link rel="component" href="/public/dynamic-list.html" />
    <title>AI Workspaces</title>
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://at-sodium.static.apphor.de/",
          "@app/": "./public/"
        }
      }
    </script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-sans h-dvh flex flex-col overflow-hidden">
    <template app>
      <app-header class="contents"></app-header>
      <template if="profile">
        <main class="flex-1 flex overflow-hidden justify-stretch items-stretch">
          <app-chat class="w-full md:w-1/2"></app-chat>
          <app-editor class="w-full md:w-1/2"></app-editor>
        </main>
      </template>
      <script setup>
        import { storeToRefs } from "@li3/store";
        import { useStore } from "@app/store.mjs";

        window.addEventListener("unhandledrejection", (event) => console.error(event));

        export default function () {
          const store = useStore();
          const { profile } = storeToRefs(store);
          return { profile };
        }
      </script>
    </template>

    <script type="module" async defer src="https://console.apphor.de/index.mjs"></script>
    <script type="module">
      import { load } from "@li3/web";
      ["lucide-icon", "markdown-block", "code-editor", "file-tree"].map((x) =>
        load(`https://sodium.static.apphor.de/${x}.html`),
      );
    </script>
    <script async src="https://cdn.tailwindcss.com"></script>
  </body>
</html>
