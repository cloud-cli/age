<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="component" href="/public/app-header.html" />
    <link rel="component" href="/public/app-chat.html" />
    <title>AI Workspaces</title>
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://at-s.static.apphor.de/"
        }
      }
    </script>
    <script type="module">
      import { load } from "@li3/web";
      ["lucide-icon", "markdown-block", "code-editor"].map((x) => load(`https://sodium.static.apphor.de/${x}.html`));
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 font-sans h-dvh flex flex-col overflow-hidden">
    <template app>
      <app-header
        class="contents"
        bind-workspace="ws"
        on-profile="onSetProfile($event.detail)"
        on-select="onSelectWorkspace($event.detail)"
        on-
      ></app-header>

      <template if="profile">
        <main class="flex-1 flex overflow-hidden">
          <app-chat bind-workspace="ws" class="contents"></app-chat>
        </main>
      </template>
      <script setup>
        import { hook } from "@li3/web";

        export default function () {
          const [ws, onSelectWorkspace] = hook("");
          const [profile, onSetProfile] = hook(null);

          return { ws, onSelectWorkspace, profile, onSetProfile };
        }
      </script>
    </template>

    <template component="collapsed-text">
      <div>
        <div class="whitespace-pre overflow-hidden" style-max-height="expanded ? '' : '100px'">{{ content }}</div>
        <div class="flex text-xs items-center justify-end">
          <button on-click="onToggle(!expanded)" class="text-zinc-500 p-1">
            <lucide-icon size="16" bind-icon="expanded ? 'chevron-up' : 'chevron-down'"></lucide-icon>
          </button>
        </div>
      </div>
      <script setup>
        import { defineProp, hook } from "@li3/web";

        export default function () {
          defineProp("content");
          const [expanded, onToggle] = hook(false);
          return { expanded, onToggle };
        }
      </script>
    </template>

    <template component="dynamic-list">
      <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1 gap-1">
        <span class="text-[10px] text-zinc-500 font-mono uppercase mr-2 hidden md:block">{{ label || '' }}</span>
        <select
          class="bg-transparent text-xs text-zinc-300 cursor-pointer"
          on-change="onSelect($event.target.value)"
          bind-value="selected"
        >
          <option bind-value="null">{{ placeholder }}</option>
          <template for="s of list">
            <option bind-value="s.value">{{ s.label }}</option>
          </template>
        </select>
        <button type="button" on-click="onAdd()" class="text-xs text-zinc-600">
          <lucide-icon icon="plus" size="16" title="Add"></lucide-icon>
        </button>
        <button type="button" on-click="onReload()" class="text-xs text-zinc-600">
          <lucide-icon class="block" class-animate-spin="!!spinning" icon="refresh-cw" size="16" title="Reload"></lucide-icon>
        </button>
      </div>
      <script setup>
        import { defineProp, defineEvent } from "@li3/web";

        export default function () {
          const list = defineProp("list");
          const label = defineProp("label");
          const selected = defineProp("selected");
          const placeholder = defineProp("placeholder");
          const spinning = defineProp('spinning');
          const onAdd = defineEvent("add");
          const onReload = defineEvent("reload");
          const onSelect = defineEvent("select");

          return { onAdd, onReload, onSelect };
        }
      </script>
    </template>

    <script type="module" async defer src="https://console.apphor.de/index.mjs"></script>
  </body>
</html>
