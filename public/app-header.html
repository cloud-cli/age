<template component="app-header">
  <header
    class="h-14 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-4 flex items-center justify-between z-10"
  >
    <button class="flex items-center space-x-3" on-click="window.location.reload()">
      <span class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
      <span class="font-semibold text-sm tracking-wide uppercase text-zinc-300 hidden md:block">Workspaces</span>
    </button>

    <template if="profile">
      <div class="flex items-center flex-wrap">
        <dynamic-list
          label="Workspace"
          placeholder="Select"
          bind-list="wsListMapped"
          bind-selected="workspace"
          on-reload="onReloadWorkspaceList()"
          on-add="onCreateWorkspace()"
          on-select="onSelectWorkspace($event.detail)"
          on-remove="onRemoveWorkspace()"
          bind-actions="[{ icon: 'trash-2', action: 'remove', label: 'Remove', color: 'text-red-400' }]"
        ></dynamic-list>

        <dynamic-list
          label="Session"
          placeholder="Switch sessions"
          on-add="store.createSession()"
          on-reload="store.reloadSessionList()"
          on-select="store.setSessionById($event.detail)"
          on-remove="onDeleteSession()"
          bind-selected="sessionId"
          bind-list="sessionListMapped"
          bind-actions="[{ icon: 'trash-2', action: 'remove', label: 'Remove', color: 'text-red-400' }]"
        ></dynamic-list>
      </div>
    </template>

    <div class="flex items-center space-x-3">
      <button
        on-click="signIn(true)"
        class="text-emerald-600 hover:text-emerald-500 border border-zinc-950 p-2 rounded-full transition"
      >
        <lucide-icon icon="user"></lucide-icon>
      </button>
    </div>
  </header>

  <script setup src="./app-header.mjs"></script>
</template>
