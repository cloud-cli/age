<template component="app-chat">
  <section class="flex flex-col bg-zinc-950 border-r border-zinc-800 h-full">
    <div class="flex items-center justify-between px-4 py-2 gap-2" class-hidden="!workspace">
      <div class="flex items-center gap-2">
        <button
          type="button"
          on-click="store.reloadMessages()"
          class="text-xs text-zinc-600 font-mono"
          class-hidden="!session"
        >
          <lucide-icon icon="refresh-cw" size="16" title="Reload"></lucide-icon>
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 font-mono text-xs flex flex-col-reverse gap-2">
      <template for="m of messages">
        <div
          class="max-w-3xl bg-zinc-900 border border-zinc-700 rounded-md p-2 leading-relaxed relative mx-auto w-full"
        >
          <span
            class="absolute inline-block rounded p-1 -mt-7 bg-zinc-700"
            class-hidden="!m.meta?.model || m.meta?.thinking === true"
            >{{ m.meta?.model }}</span
          >
          <div class="absolute right-0 top-0 m-2" class-hidden="m.meta?.thinking === true">
            <button
              on-click="onDeleteMessage(m.meta?.uid)"
              class="p-1 text-red-400/70 bg-zinc-900 rounded"
              class-hidden="!m.meta?.uid"
            >
              <lucide-icon icon="trash-2" size="16" title="Delete message"></lucide-icon>
            </button>
          </div>
          <template if="m.role !== 'tool'">
            <div>
              <lucide-icon
                icon="loader"
                size="12"
                class="mr-2 text-zinc-400"
                bind-class="{ 'inline-block.animate-spin': m.meta?.thinking, 'hidden': !m.meta?.thinking }"
              ></lucide-icon>

              <markdown-block
                bind-src="m.content || m.thinking"
                class-text-zinc-300="m.thinking"
                class="block"
              ></markdown-block>
            </div>
          </template>

          <template if="m.role === 'tool'">
            <div class="text-zinc-500">
              <div class="flex items-center text-emerald-500">
                <span class="mr-2">✓</span>Tool:
                <code class="text-zinc-300 ml-1 px-1 py-0.5">{{ m.tool_name }}</code>
              </div>
              <collapsed-text bind-content="m.content"></collapsed-text>
            </div>
          </template>
        </div>
      </template>
    </div>

    <div class="p-3 border-t border-zinc-800 bg-zinc-900/20" class-hidden="!workspace">
      <div class="relative bg-zinc-900 border border-zinc-800 rounded-xl focus-within:border-zinc-700 transition p-2">
        <form on-submit.prevent="onSend()">
          <textarea
            rows="2"
            name="prompt"
            placeholder="Next step"
            bind-value="newMessage"
            bind-disabled="sending"
            class="w-full bg-transparent text-sm placeholder-zinc-600 focus:outline-none resize-none px-2 py-1"
            class-text-zinc-200="!sending"
            class-text-zinc-600="sending"
            on-input.stop="setMessage($event.target.value)"
            on-keydown="onKeyDown($event)"
          ></textarea>
          <div class="flex justify-between items-center p-2 px-1">
            <dynamic-list
              label="Model"
              placeholder="Model to use"
              bind-list="modelListMapped"
              bind-selected="model"
              on-reload="store.reloadModelList()"
              on-select="store.setModel($event.detail)"
              on-add="onPullModel()"
            ></dynamic-list>

            <button
              type="submit"
              class="hover:bg-zinc-200 text-zinc-950 font-semibold text-xs px-3 py-1 rounded-md transition"
              class-animate-pulse.bg-white.opacity-70="sending"
              class-bg-zinc-100="!sending && newMessage.trim()"
              bind-disabled="sending"
            >
              <lucide-icon icon="send-horizontal" size="16" title="Send"></lucide-icon>
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script setup src="./app-chat.mjs"></script>
</template>
