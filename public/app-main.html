<template component="app-main">
  <app-header class="contents"></app-header>
  <template if="store.profile">
    <main class="flex-1 flex overflow-hidden justify-stretch items-stretch">
      <div class="my-1 flex items-center justify-center space-x-2">
        <button
          on-click="toggleItem('left')"
          class="inline-block rounded-full p-1"
          bind-class="{ 'text-blue-400': t.left, 'text-white-400': t.left }"
          title="Toggle left panel"
        >
          <lucide-icon size="16" icon="panel-left"></lucide-icon>
        </button>
        <button
          on-click="toggleItem('center')"
          class="inline-block rounded-full p-1"
          bind-class="{ 'text-blue-400': t.center, 'text-white-400': t.center }"
          title="Toggle center panel"
        >
          <lucide-icon size="16" icon="square-menu"></lucide-icon>
        </button>
        <button
          on-click="toggleItem('right')"
          class="inline-block rounded-full p-1"
          bind-class="{ 'text-blue-400': t.right, 'text-white-400': t.right }"
          title="Toggle right panel"
        >
          <lucide-icon size="16" icon="panel-right"></lucide-icon>
        </button>
      </div>

      <template if="store.workspace">
        <section class="flex items-center justify-stretch">
          <app-chat class="h-full w-1/3" class-hidden="!t.left"></app-chat>

          <code-editor
            class="h-full w-1/3"
            class-hidden="!t.center"
            bind-status="store.selectedFile?.path || ''"
            bind-value="store.selectedFile?.content || ''"
            on-change="store.setFileContent($event.target.value)"
          ></code-editor>

          <app-files class="h-full w-1/3" class-hidden="!t.right"></app-files>
        </section>
      </template>
    </main>
  </template>
  <script setup>
    import { storeToRefs } from "@li3/store";
    import { useStore } from "@app/store.mjs";

    window.addEventListener("unhandledrejection", (event) => console.error(event));

    export default function () {
      const store = useStore();
      const t = ref({
        appChat: true,
        appEditor: true,
        appFiles: true,
      });
      const toggleItem = (x) => (t.value[x] = !t.value[x]);

      return { t, store };
    }
  </script>
</template>
