<template component="collapsed-text">
  <ref name="expanded" value="false" setter="onToggle" />
  <div class="relative">
    <div class="whitespace-pre-wrap overflow-hidden" class-max-height="!expanded">
      <slot></slot>
    </div>
    <div class="absolute bottom-0 flex text-xs items-center justify-end w-full">
      <button on-click="onToggle(!expanded)" class="text-zinc-500">
        <lucide-icon size="16" bind-icon="expanded ? 'chevron-up' : 'chevron-down'"></lucide-icon>
      </button>
    </div>
  </div>
  <style>
    .max-height {
      max-height: 4rem;
    }
  </style>
</template>
