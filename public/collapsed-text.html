<template component="collapsed-text">
  <div>
    <div class="whitespace-pre overflow-hidden" style-max-height="expanded ? '' : '100px'">{{ content }}</div>
    <div class="flex text-xs items-center justify-end">
      <button on-click="onToggle(!expanded)" class="text-zinc-500 p-1">
        <lucide-icon size="16" bind-icon="expanded ? 'chevron-up' : 'chevron-down'"></lucide-icon>
      </button>
    </div>
  </div>
  <script setup>
    import { defineProp, hook } from "@li3/web";

    export default function () {
      defineProp("content");
      const [expanded, onToggle] = hook(false);
      return { expanded, onToggle };
    }
  </script>
</template>
