<template component="app-files">
  <div class="flex flex-col items-stretch space-y-1 border-l border-zinc-800">
    <div
      class="flex items-center justify-between bg-zinc-500/50 gap-1 p-1 text-zinc-300"
    >
      <span class="uppercase text-xs font-semi flex-1">Files</span>
      <div>
        <button on-click="store.reloadFileList()">
          <lucide-icon size="14" icon="refresh-cw" title="Reload"></lucide-icon>
        </button>
        <button
          on-click="store.addFileToSession()"
          bind-disabled="!store.selectedFile"
          class-text-zinc-500="!store.selectedFile"
        >
          <lucide-icon
            size="14"
            icon="message-square-plus"
            title="Add to conversation"
          ></lucide-icon>
        </button>
      </div>
    </div>
    <file-tree
      class="flex-1"
      bind-files="store.files"
      bind-expanded="store.expanded"
      on-expand="store.setExpanded($event.detail)"
      on-select="onSelectFile($event.detail)"
    ></file-tree>
    <div class="font-bold p-2 text-center" class-hidden="!store.files?.length">No files in this workspace.</div>
  </div>
  <script setup>
    import { useStore } from "@app/store.mjs";

    export default function () {
      const store = useStore();

      async function onSelectFile(file) {
        store.setSelectedFile(file);
        store.loadFileContent();
      }

      return { onSelectFile, store };
    }
  </script>
</template>
